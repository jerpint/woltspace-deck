<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:#B8D4E8;color:var(--ink);min-height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Sky area with brand ── */
.sky{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:2;
  animation:fadeUp 0.7s ease both;
}
.brand-card{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:36px 56px 32px;
  background:rgba(237,232,222,0.85);
  border:1px solid var(--border);border-radius:18px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 8px 40px rgba(24,16,10,0.12);
}
.brand-name{font-family:var(--font-display);font-size:72px;font-weight:300;letter-spacing:-0.02em;color:var(--ink);line-height:1}
.tagline{font-family:var(--font-mono);font-size:14px;color:var(--ink-3);letter-spacing:0.12em;text-transform:uppercase}
.subtitle{font-family:var(--font-body);font-size:20px;color:var(--ink-2);font-weight:300;line-height:1.6;margin-top:4px}

/* ── Background scene — copied from lodge home.css ── */
.bg-scene{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#bg-nature{position:absolute;bottom:0;left:0;right:0;pointer-events:none}
#bg-nature svg{width:100%;display:block}
@keyframes river-scroll{0%{transform:translateX(0)}100%{transform:translateX(60px)}}
.bg-river-shimmer{
  position:absolute;bottom:0;left:-60px;width:calc(100% + 120px);height:40px;
  background:repeating-linear-gradient(90deg,transparent 0px,transparent 10px,rgba(144,212,232,0.18) 10px,rgba(144,212,232,0.18) 15px);
  animation:river-scroll 1.4s linear infinite;pointer-events:none;
}

/* Sprite 2-frame switching */
.sprite-2frame{position:relative;display:inline-block}
.sprite-2frame>.frm-a{position:relative;display:block}
.sprite-2frame>.frm-b{position:absolute;top:0;left:0}
@keyframes frm-a-on{0%,49.9%{opacity:1}50%,100%{opacity:0}}
@keyframes frm-b-on{0%,49.9%{opacity:0}50%,100%{opacity:1}}
.frm-a{animation:frm-a-on 0.38s steps(1,end) infinite}
.frm-b{animation:frm-b-on 0.38s steps(1,end) infinite}

/* Creature movement animations — from lodge home.css */
@keyframes swim-across{
  0%{transform:translateX(55vw) scaleX(-1)}
  44%{transform:translateX(5vw) scaleX(-1)}
  44.1%{transform:translateX(5vw)}
  88%{transform:translateX(55vw)}
  88.1%{transform:translateX(55vw) scaleX(-1)}
  100%{transform:translateX(55vw) scaleX(-1)}
}
@keyframes walk-bob{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}
@keyframes raccoon-wander{
  0%{transform:translateX(12vw)}
  44%{transform:translateX(62vw)}
  44.1%{transform:translateX(62vw) scaleX(-1)}
  88%{transform:translateX(12vw) scaleX(-1)}
  88.1%{transform:translateX(12vw)}
  100%{transform:translateX(12vw)}
}
@keyframes log-bob{0%,100%{transform:translateY(0px) rotate(-2deg)}50%{transform:translateY(-9px) rotate(3deg)}}
@keyframes leaf-fall{0%{transform:translate(0,0) rotate(0deg);opacity:0}6%{opacity:0.8}94%{opacity:0.8}100%{transform:translate(80px,60vh) rotate(480deg);opacity:0}}
@keyframes ripple-out{0%{transform:translate(-50%,-50%) scale(0.1);opacity:0.5}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
@keyframes peek-up{0%{transform:translateY(120%)}18%{transform:translateY(-4%)}82%{transform:translateY(-4%)}100%{transform:translateY(120%)}}
@keyframes fish-jump{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:1}40%{transform:translateY(-110px) rotate(-28deg);opacity:1}80%{transform:translateY(12px) rotate(50deg);opacity:0.4}100%{transform:translateY(0) rotate(0deg);opacity:0}}
@keyframes cloud-drift{0%{transform:translateX(calc(100vw + 400px))}100%{transform:translateX(-400px)}}
@keyframes float-up-fade{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-90px);opacity:0}}

.bg-beaver-main{position:absolute;bottom:62px;left:0;animation:swim-across 65s linear infinite}
.bg-beaver-main .sprite-2frame{animation:walk-bob 0.45s ease-in-out infinite}
.bg-raccoon{position:absolute;bottom:50px;animation:raccoon-wander 55s linear 0s infinite}
.bg-raccoon .sprite-2frame{animation:walk-bob 0.5s ease-in-out infinite}
.bg-log{position:absolute;bottom:42px;right:190px;animation:log-bob 4.2s ease-in-out infinite}
.bg-ripple-container{position:absolute;bottom:28px;right:60px;width:90px;height:50px}
.bg-ripple{position:absolute;top:50%;left:50%;width:70px;height:36px;border:2px solid rgba(74,139,168,0.4);border-radius:50%;animation:ripple-out 3.2s ease-out infinite}
.bg-ripple:nth-child(2){animation-delay:1.1s}
.bg-ripple:nth-child(3){animation-delay:2.2s}
.bg-leaf{position:absolute;top:48%;right:28%;animation:leaf-fall 14s ease-in 0s infinite;opacity:0}
.bg-peek{position:absolute;bottom:0;display:none}
.bg-peek.active{display:block;animation:peek-up 5s ease-in-out forwards}
.bg-emoji-float{position:absolute;font-size:22px;animation:float-up-fade 3.2s ease-out forwards;pointer-events:none}
.bg-fish{position:absolute;bottom:8px;display:none}
.bg-fish.active{display:block;animation:fish-jump 2.5s ease-in-out forwards}
.bg-cloud{position:absolute;pointer-events:none;animation:cloud-drift linear infinite;opacity:0.88}

/* Nav */
.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}
.slide-nav .hidden{visibility:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .brand-card{padding:24px 28px 20px}
  .brand-name{font-size:44px}
  .tagline{font-size:12px}
  .subtitle{font-size:16px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>

function renderBgSprite(map,pal,px){
  var rows=map.length,cols=Math.max.apply(null,map.map(function(r){return r.length;}));
  var rects=[];
  for(var r=0;r<rows;r++)for(var c=0;c<map[r].length;c++){
    var fill=pal[map[r][c]];if(!fill)continue;
    rects.push('<rect x="'+(c*px)+'" y="'+(r*px)+'" width="'+px+'" height="'+px+'" fill="'+fill+'"/>');
  }
  var w=cols*px,h=rows*px;
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block" shape-rendering="crispEdges">'+rects.join('')+'</svg>';
}

// ── Inject sprites — from home-scene.js ──
(function(){
  var PX=8;
  function inject(id,mapKey,palKey,px){
    var el=document.getElementById(id);
    if(el)el.innerHTML=renderBgSprite(BG_SPRITE_MAPS[mapKey],BG_SPRITE_PAL[palKey],px||PX);
  }
  inject('sp-bv-main-a','bvA','bv',4);
  inject('sp-bv-main-b','bvB','bv',4);
  inject('sp-rc-a','rcA','rc',3);
  inject('sp-rc-b','rcB','rc',3);
  inject('sp-log','log','lg',4);

  inject('sp-peek','peek','pk',4);

    var svg=el.querySelector('svg');
    if(svg){el.style.width=svg.getAttribute('width')+'px';el.style.height=svg.getAttribute('height')+'px';}
  });
})();

// ── Landscape generator — from home-scene.js ──
(function(){
  var S=5,W=Math.ceil(Math.max(window.innerWidth,screen.width||1920)/S)+6,H=48,BANK=34,RIVER=40;
  var C={fa:'#8AA6BA',fb:'#6A8698',sn:'#F0F4F8',sb:'#C8D8E8',na:'#3E5A32',nb:'#293E20',ta:'#3A7030',tb:'#2A5225',tc:'#1A3A18',tt:'#4A2810',ga:'#72B855',gb:'#4A8838',gc:'#2A5A1A',ea:'#5A4020',eb:'#3A2810',ra:'#90D4E8',rb:'#4AAAC8',rc:'#2A7AAA',rd:'#1A5888',ba:'#3A7030',bb:'#224A1A'};
  function dot(x,y,c){return'<rect x="'+(x*S)+'" y="'+(y*S)+'" width="'+S+'" height="'+S+'" fill="'+c+'"/>';}
  var fp=[],np=[];
  for(var x=0;x<W;x++){fp[x]=Math.round(7+5*Math.sin(x*0.05+0.3)+3*Math.sin(x*0.12+1.7)+1.5*Math.sin(x*0.04+0.9));np[x]=Math.round(6+6*Math.sin(x*0.08+1.0)+3.5*Math.sin(x*0.16+0.5)+1.5*Math.sin(x*0.22+2.4));}
  var out=[];
  // Far hills with snow caps
  for(var x=0;x<W;x++){var ft=BANK-16-fp[x];var snowLine=ft+3;for(var y=Math.max(ft,0);y<BANK;y++){var col;if(y<=snowLine){col=y===ft?C.sn:(y===snowLine?C.sb:C.sn);}else{col=y===ft?C.fb:C.fa;}out.push(dot(x,y,col));}}
  // Near hills
  for(var x=0;x<W;x++){var nt=BANK-2-np[x];for(var y=Math.max(nt,1);y<BANK;y++)out.push(dot(x,y,y===nt?C.nb:C.na));}
  // Grass + earth
  for(var x=0;x<W;x++){out.push(dot(x,BANK,C.ga));out.push(dot(x,BANK+1,C.gb));out.push(dot(x,BANK+2,C.gc));out.push(dot(x,BANK+3,C.ea));for(var y=BANK+4;y<RIVER;y++)out.push(dot(x,y,C.eb));}
  // River with shimmer variation
  for(var x=0;x<W;x++){out.push(dot(x,RIVER,C.ba));var sh=((x*3+2)%9<2)?C.ra:(x%5===0?C.rb:C.rc);out.push(dot(x,RIVER+1,sh));out.push(dot(x,RIVER+2,C.rc));out.push(dot(x,RIVER+3,C.rd));for(var y=RIVER+4;y<H;y++)out.push(dot(x,y,C.rd));}
  // Trees
  function tree(cx,baseY,h){for(var dy=0;dy<h;dy++){var hw=Math.floor((dy+1)*0.55),tc=dy<2?C.ta:(dy<h-2?C.tb:C.tc);for(var dx=-hw;dx<=hw;dx++){var tx=cx+dx;if(tx>=0&&tx<W)out.push(dot(tx,baseY-h+1+dy,tc));}}if(cx>=0&&cx<W){out.push(dot(cx,baseY+1,C.tt));out.push(dot(cx,baseY+2,C.tt));}}
  var tx=3;while(tx<W-3){var nt2=BANK-2-np[tx];if(nt2<BANK-7)tree(tx,nt2+Math.floor(np[tx]*0.55),5+((tx*7)%4));tx+=7+((tx*13+5)%5);}

  var el=document.getElementById('bg-nature');
  if(el)el.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="'+(W*S)+'" height="'+(H*S)+'" style="image-rendering:pixelated;display:block" shape-rendering="crispEdges">'+out.join('')+'</svg>';
})();

  var SHAPES={

    md:['....OOO...OOO.......', '...OwWwOOOwWwO......', '..OwWWWwOwWWWwO.....', '.OOwWWWWwwWWWWwOO...', '.OwwWWWWWWWWWWWwO...', '.OwWWWWWWWWWWWWwO...', '.OwWWWWWWWWWWWWwO...', '.OwwWWWWWWWWWWwwO...', '.OssssssssssssssO...', '..OOOOOOOOOOOOOO....'],

  function renderCloud(map,px){var cols=Math.max.apply(null,map.map(function(r){return r.length;})),rects=[];for(var r=0;r<map.length;r++)for(var c=0;c<map[r].length;c++){var fill=CP[map[r][c]];if(!fill)continue;rects.push('<rect x="'+(c*px)+'" y="'+(r*px)+'" width="'+px+'" height="'+px+'" fill="'+fill+'"/>');}var w=cols*px,h=map.length*px;return'<svg width="'+w+'" height="'+h+'" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block" shape-rendering="crispEdges">'+rects.join('')+'</svg>';}
  [{id:'cl-1',shape:'lg',px:7},{id:'cl-2',shape:'md',px:6},{id:'cl-3',shape:'sm',px:6},{id:'cl-4',shape:'lg',px:6},{id:'cl-5',shape:'md',px:5},{id:'cl-6',shape:'sm',px:5}].forEach(function(c){var el=document.getElementById(c.id);if(el)el.innerHTML=renderCloud(SHAPES[c.shape],c.px);});
})();

// ── Wackiness engine — from home-scene.js ──
(function(){
  var WACKY_EMOJIS=['🐟','🍂','💦','🌿','🪵','🦆','🐸','🍄','🌊','🪨','🌰','🐛'];
  function spawnFloatingEmoji(){
    var scene=document.getElementById('bg-scene');
    if(!scene)return;
    var el=document.createElement('div');
    el.className='bg-emoji-float';
    el.textContent=WACKY_EMOJIS[Math.floor(Math.random()*WACKY_EMOJIS.length)];
    el.style.left=(8+Math.random()*84)+'%';
    el.style.bottom=(8+Math.random()*35)+'%';
    el.style.fontSize=(14+Math.random()*18)+'px';
    el.style.opacity='0.7';
    scene.appendChild(el);
    setTimeout(function(){el.remove();},3500);
  }
  function triggerPeek(){
    var peek=document.getElementById('bg-peek');
    if(!peek||peek.classList.contains('active'))return;
    peek.style.left=(15+Math.random()*55)+'%';
    peek.classList.add('active');
    setTimeout(function(){peek.classList.remove('active');},5500);
  }
  function triggerFishJump(){
    var fish=document.getElementById('bg-fish');
    if(!fish||fish.classList.contains('active'))return;
    fish.style.right=(80+Math.random()*200)+'px';
    fish.classList.add('active');
    setTimeout(function(){fish.classList.remove('active');},2800);
  }
  var events=[triggerPeek,triggerPeek,triggerPeek,triggerFishJump,spawnFloatingEmoji,spawnFloatingEmoji];
  function scheduleNext(){
    var delay=5000+Math.random()*12000;
    setTimeout(function(){events[Math.floor(Math.random()*events.length)]();scheduleNext();},delay);
  }
  setTimeout(triggerPeek,2000);
  setTimeout(scheduleNext,6000);
})();
</script>
