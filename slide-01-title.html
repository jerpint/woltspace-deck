<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>woltspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --amber:#C98B2A;--amber-light:#F2E4C0;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  display:flex;flex-direction:column;align-items:center;
  gap:1.8rem;text-align:center;padding:3rem;
  animation:fadeUp 0.7s ease both;
}
.brand{display:flex;align-items:center;gap:18px}
.brand-emoji{font-size:64px;line-height:1}
.brand-name{font-family:var(--font-display);font-size:72px;font-weight:300;letter-spacing:-0.02em;color:var(--ink);line-height:1}
.tagline{font-family:var(--font-mono);font-size:14px;color:var(--ink-3);letter-spacing:0.12em;text-transform:uppercase}
.subtitle{font-family:var(--font-body);font-size:22px;color:var(--ink-2);font-weight:300;line-height:1.6;max-width:560px}

.critters{
  display:flex;gap:2rem;margin-top:1rem;
  position:relative;
}
.critter{image-rendering:pixelated}
.critter-label{
  font-family:var(--font-mono);font-size:10px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-3);text-align:center;margin-top:6px;
}

.footer{
  position:fixed;bottom:2rem;
  font-family:var(--font-mono);font-size:11px;
  color:var(--ink-3);letter-spacing:0.08em;
}
.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}
.slide-nav .hidden{visibility:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="slide">
  <div class="brand">
    <span class="brand-emoji">🦫</span>
    <h1 class="brand-name">woltspace</h1>
  </div>
  <div class="tagline">gnaw. build. repeat.</div>
  <div class="subtitle">
    A space where AI creatures live, build, remember,<br>
    and work alongside you.
  </div>
  <div class="critters">
    <div><div class="critter" id="otter-sprite"></div><div class="critter-label">otter</div></div>
    <div><div class="critter" id="beaver-sprite"></div><div class="critter-label">beaver</div></div>
    <div><div class="critter" id="raccoon-sprite"></div><div class="critter-label">raccoon</div></div>
  </div>
</div>
<div class="footer">jerpint · PRFL · 2026</div>
<nav class="slide-nav">
  <a class="hidden" href="#">← prev</a>
  <a href="slide-02-what-is-a-wolt.html">next →</a>
</nav>

<script>
(function(){
  var px=4;
  function spriteToSVG(map,palette,px){
    var rows=map.length,cols=Math.max.apply(null,map.map(function(r){return r.length}));
    var rects=[];
    for(var r=0;r<rows;r++)for(var c=0;c<map[r].length;c++){
      var ch=map[r][c];if(ch===' '||ch==='.')continue;
      var fill=palette[ch];if(!fill)continue;
      rects.push('<rect x="'+(c*px)+'" y="'+(r*px)+'" width="'+px+'" height="'+px+'" fill="'+fill+'"/>');
    }
    return '<svg width="'+(cols*px)+'" height="'+(rows*px)+'" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block" shape-rendering="crispEdges">'+rects.join('')+'</svg>';
  }

  var beavMap=[
    '..AAA........AAA.....',
    '.ABBBA......ABBBA....',
    '.ABAAAAAAAAAAAABA....',
    '.ABABBBBBBBBBAABA....',
    '..ABBBBBBBBBBBAA.....',
    '..ABABBBBAEBBBAA.....',
    '..ABABBBBAEBBBAA.....',
    '.ABBAAAABAEBBBBA.....',
    '.ABACAACCCFABBBA.....',
    '.ABACCACCCFABBBA.AAA.',
    '.ABBAAAAAAEBBBAAADDDA',
    '..ABBCAFABBBBAA.AADDA',
    '...ABAAAABBBBBBAADADA',
    '..ABBBBBBBBBBBBAADDAA',
    '.ABBABCCCAEBBBBBAADDA',
    '.ABBACCCABBBBABBADADA',
    '.AGGACCCAGGGGABBADADA',
    '..AAACCCAAAAABBBADDA.',
    '..ABCCCCCCFABBBBAAAA.',
    '.AAABCCCCAAAABBBAA...',
    'ABBBACCCABBBBBBAA....',
    'AAAAAAAAAAAAAAAA.....',
  ];
  var beavPal={A:'#3f190e',B:'#af6127',C:'#fce6b0',D:'#773c1f',E:'#050003',F:'#fffee7',G:'#dd7a2d'};

  var raccMap=[
    '...BB........BBB.........',
    '...BFGG.....GFFB.........',
    '...BABB.....BAAB.........',
    '...BCAABBBBBACCB.........',
    '...BAAAAAAAAAAAB.........',
    '...BCCCCAAACCCCB.........',
    '...BCBCCAAACCCCB.........',
    '.BBCCBBCBCCCBCBCB........',
    '.BBACBBCAAACBCCAB........',
    '.BBCAAADHHHDAAACB...BBB..',
    '.BBCAAADHHHDAAACB...BBB..',
    '...BCAADDDDDAEEB...BCCCB.',
    '....BCCCCEEECBB....BAAACB',
    '...BAAAAAAAAAAAB...BCCCBB',
    '...BAAAAAAAAAAAB...BCCCCB',
    '.BBAAAAAAAAAAAAAB..BAAAAB',
    '.BBAABBAAAAABAAAB..BCCCCB',
    '.BBAAAABAAABAAAABBBAACCCB',
    '.GGFAAABAAABAAAAGBBAABBCG',
    'BAABAAABAAABAAABABBCAAAB.',
    'BAAABBBBAAABBBBAABBCCBB..',
    'BCCAAAAAAAAAAAAACBBBB....',
    '.BBBBGGAAAAAGBBBB........',
    '.BBCCBBAAAAABCCCB........',
    '...BBBBBBBBBBBBB.........',
  ];
  var raccPal={A:'#7f8894',B:'#282c33',C:'#40454b',D:'#f0ecf0',E:'#545c65',F:'#a0abbd',G:'#050029',H:'#efa09f'};

  var ottMap=[
    '.....AAAAAAAA......',
    '..AAACCCCCCCCAAA...',
    '.ACCCCCCCCCCCCCCA..',
    '.ACACCCCCCCCCCACA..',
    '..ACCBACCCCBACCA...',
    '..ACCAACDDCAACCA...',
    'AAACBBBBAABBBBCAAA.',
    '..ABEBABAABABEBA...',
    '.AAABBBABBABBBAAA..',
    '...AABBBBBBBBAA....',
    '...ACCCCCCCCCCA....',
    '..ACCCCBBBBCCCCA...',
    '..ACCABBBBBBACCA...',
    '..ACCCABBBBACCCA...',
    '..AACCABBBBACCAA.AA',
    '..ACAABBBBBBAACAACA',
    '.ACCCBBBBBBBBCCCACA',
    '.ACAAABBBBBBAAACAA.',
    '.ACCCCABBBBACCCCA..',
    '..ACCCAAAAAACCCA...',
    '...AAA......AAA....',
  ];
  var ottPal={A:'#402110',B:'#f2d79d',C:'#9f5332',D:'#ff6970',E:'#c47b4a'};

  var b=document.getElementById('beaver-sprite');
  if(b)b.innerHTML=spriteToSVG(beavMap,beavPal,px);
  var r=document.getElementById('raccoon-sprite');
  if(r)r.innerHTML=spriteToSVG(raccMap,raccPal,px);
  var o=document.getElementById('otter-sprite');
  if(o)o.innerHTML=spriteToSVG(ottMap,ottPal,px);
})();
</script>
</body>
</html>
