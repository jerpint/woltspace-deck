<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --amber:#C98B2A;--amber-light:#F2E4C0;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(0.8rem, 2vw, 1.6rem);text-align:center;padding:clamp(1rem, 3vw, 2.5rem);
  animation:fadeUp 0.7s ease both;
  max-width:100%;
}

.company-logo{color:#000;display:flex;align-items:center}
.eyebrow{
  font-family:var(--font-mono);font-size:12px;font-weight:600;
  color:var(--terra);letter-spacing:0.2em;text-transform:uppercase;
}
h1{
  font-family:var(--font-display);font-size:clamp(40px, 8vw, 96px);font-weight:300;
  letter-spacing:-0.02em;color:var(--ink);line-height:1;
}
h1 .accent{color:var(--terra)}

.subtitle{
  font-size:18px;color:var(--ink-2);font-weight:300;
  max-width:500px;line-height:1.5;
}

.cta-row{
  display:flex;flex-direction:column;align-items:center;gap:clamp(12px, 2vw, 24px);
  margin-top:0.2rem;
}
.cta-col{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  min-width:0;
}
.cta-kicker{
  font-family:var(--font-mono);font-size:clamp(14px, 2vw, 18px);font-weight:600;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-3);
}

.hero-link{
  font-family:var(--font-display);font-size:clamp(28px, 5vw, 64px);font-weight:300;
  color:var(--ink);text-decoration:none;letter-spacing:-0.01em;
  line-height:1;display:inline-block;
  transition:color 0.2s, transform 0.2s;
}
.hero-link .tld{color:var(--terra)}
.hero-link:hover{transform:translateY(-2px)}

.bottom-row{
  display:flex;align-items:center;gap:clamp(1.5rem, 5vw, 4rem);
  justify-content:center;
}
.qr-block{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  text-decoration:none;transition:transform 0.2s;
}
.qr-block:hover{transform:translateY(-2px)}
.qr-block img{
  width:clamp(90px, 14vw, 140px);height:clamp(90px, 14vw, 140px);
  display:block;image-rendering:pixelated;
  background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px;
}
.qr-block-label{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-mono);font-size:clamp(14px, 2vw, 18px);font-weight:500;
  letter-spacing:0.04em;color:var(--ink-3);
}
.gh-icon{width:20px;height:20px;flex-shrink:0}

.critters{
  display:flex;gap:clamp(1rem, 3vw, 2.5rem);margin-top:0.5rem;
  align-items:flex-end;
}
.critters > div{display:flex;flex-direction:column;align-items:center;width:clamp(60px, 10vw, 100px)}
.critter{image-rendering:pixelated;display:flex;justify-content:center}
@keyframes waddle{0%,100%{transform:rotate(0deg) translateY(0)}25%{transform:rotate(-8deg) translateY(-3px)}75%{transform:rotate(8deg) translateY(-3px)}}
.critter.raccoon{animation:waddle 0.6s ease-in-out infinite}
.critter.raccoon svg{transform:scale(0.85)}
@keyframes pirouette{0%{transform:rotateY(0deg) scale(1)}50%{transform:rotateY(180deg) scale(1.1)}100%{transform:rotateY(360deg) scale(1)}}
.critter.otter{animation:pirouette 2.5s ease-in-out infinite}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.critter.beaver{animation:hop 1.2s ease-in-out infinite}
.critter-label{
  font-family:var(--font-mono);font-size:11px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-3);text-align:center;margin-top:6px;
}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}
.slide-nav .hidden{visibility:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1100px){
  .slide{gap:1.2rem;padding:2rem 1.5rem}
  h1{font-size:68px}
  .cta-row{gap:40px}
  .cta-col{min-width:180px;gap:10px}
  .hero-link{font-size:48px}
  .qr-card img{width:140px;height:140px}
  .critters{gap:1.6rem;margin-top:0.4rem}
  .critters > div{width:82px}
}

@media(max-width:600px){
  body{overflow-y:auto}
  .slide{padding:2rem 1.2rem;gap:1.2rem}
  h1{font-size:56px}
  .subtitle{font-size:15px}
  .cta-row{gap:24px}
  .cta-col{min-width:0}
  .cta-kicker{font-size:10px}
  .hero-link{font-size:40px}
  .qr-card img{width:130px;height:130px}
  .qr-label{font-size:10px}
  .critters{gap:1rem}
  .critters > div{width:70px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>
</head>
