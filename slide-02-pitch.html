<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>what is a wolt?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --amber:#C98B2A;--amber-light:#F2E4C0;
  --forest:#4A8838;--forest-light:#D6E8C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  max-width:740px;width:100%;padding:2.5rem;
  display:flex;flex-direction:column;align-items:center;
  gap:2.4rem;text-align:center;
  animation:fadeUp 0.7s ease both;
}

h1{font-family:var(--font-display);font-size:48px;font-weight:300;color:var(--ink);letter-spacing:-0.01em;line-height:1.1}

.caption{
  font-size:18px;color:var(--ink-2);font-weight:300;line-height:1.6;max-width:520px;
}

.creatures{
  display:flex;gap:20px;width:100%;max-width:660px;
  justify-content:center;
}
.creature-card{
  flex:1;max-width:200px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:24px 16px 20px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:border-color 0.2s, transform 0.2s;
}
.creature-card:hover{border-color:var(--border-2);transform:translateY(-3px)}
.creature-card.terra{border-top:3px solid var(--terra)}
.creature-card.amber{border-top:3px solid var(--amber)}
.creature-card.forest{border-top:3px solid var(--forest)}

.creature-sprite{image-rendering:pixelated;display:flex;justify-content:center;height:80px;align-items:center}

.creature-name{
  font-family:var(--font-display);font-size:22px;color:var(--ink);line-height:1;
}
.creature-model{
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;
}
.terra .creature-model{color:var(--terra);background:var(--terra-light)}
.amber .creature-model{color:var(--amber);background:var(--amber-light)}
.forest .creature-model{color:var(--forest);background:var(--forest-light)}

.creature-role{
  font-size:13px;color:var(--ink-2);line-height:1.4;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}

@media(max-width:600px){
  body{overflow-y:auto}
  .slide{padding:1.5rem 1.2rem;gap:1.6rem}
  h1{font-size:36px}
  .creatures{flex-direction:column;align-items:center;gap:12px}
  .creature-card{max-width:280px;width:100%;padding:18px 14px 16px}
  .creature-sprite{height:60px}
  .creature-name{font-size:20px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>

<div class="slide">
  <h1>what is a wolt?</h1>
  <div class="caption">A wolt is a builder. You bring the ideas, the wolts cook.<br>Each wolt has its own personality and mission, shaped by you.</div>

  <div class="creatures">
    <div class="creature-card forest">
      <div class="creature-sprite" id="otter-sprite"></div>
      <div class="creature-name">otter</div>
      <div class="creature-model">haiku</div>
      <div class="creature-role">the quick one</div>
    </div>

    <div class="creature-card amber">
      <div class="creature-sprite" id="beaver-sprite"></div>
      <div class="creature-name">beaver</div>
      <div class="creature-model">sonnet</div>
      <div class="creature-role">the builder</div>
    </div>

    <div class="creature-card terra">
      <div class="creature-sprite" id="raccoon-sprite"></div>
      <div class="creature-name">raccoon</div>
      <div class="creature-model">opus</div>
      <div class="creature-role">the thinker</div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <a href="slide-01-title.html">&larr; prev</a>
  <a href="slide-03-demo.html">next &rarr;</a>
</nav>

<script>

  var px=3;
  function spriteToSVG(map,palette,px){
    var rows=map.length,cols=Math.max.apply(null,map.map(function(r){return r.length}));
    var rects=[];
    for(var r=0;r<rows;r++)for(var c=0;c<map[r].length;c++){
      var ch=map[r][c];if(ch===' '||ch==='.')continue;
      var fill=palette[ch];if(!fill)continue;
      rects.push('<rect x="'+(c*px)+'" y="'+(r*px)+'" width="'+px+'" height="'+px+'" fill="'+fill+'"/>');
    }
    return '<svg width="'+(cols*px)+'" height="'+(rows*px)+'" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block" shape-rendering="crispEdges">'+rects.join('')+'</svg>';
  }

  var beavMap=[
    '..AAA........AAA.....',
    '.ABBBA......ABBBA....',
    '.ABAAAAAAAAAAAABA....',
    '.ABABBBBBBBBBAABA....',
    '..ABBBBBBBBBBBAA.....',
    '..ABABBBBAEBBBAA.....',
    '..ABABBBBAEBBBAA.....',
    '.ABBAAAABAEBBBBA.....',
    '.ABACAACCCFABBBA.....',

    '.ABBAAAAAAEBBBAAADDDA',
    '..ABBCAFABBBBAA.AADDA',

    '..ABBBBBBBBBBBBAADDAA',
    '.ABBABCCCAEBBBBBAADDA',
    '.ABBACCCABBBBABBADADA',
    '.AGGACCCAGGGGABBADADA',
    '..AAACCCAAAAABBBADDA.',
    '..ABCCCCCCFABBBBAAAA.',
    '.AAABCCCCAAAABBBAA...',
    'ABBBACCCABBBBBBAA....',
    'AAAAAAAAAAAAAAAA.....',
  ];
  var beavPal={A:'#3f190e',B:'#af6127',C:'#fce6b0',D:'#773c1f',E:'#050003',F:'#fffee7',G:'#dd7a2d'};

  var raccMap=[
    '...BB........BBB.........',
    '...BFGG.....GFFB.........',
    '...BABB.....BAAB.........',
    '...BCAABBBBBACCB.........',
    '...BAAAAAAAAAAAB.........',
    '...BCCCCAAACCCCB.........',
    '...BCBCCAAACCCCB.........',
    '.BBCCBBCBCCCBCBCB........',
    '.BBACBBCAAACBCCAB........',
    '.BBCAAADHHHDAAACB...BBB..',
    '.BBCAAADHHHDAAACB...BBB..',
    '...BCAADDDDDAEEB...BCCCB.',
    '....BCCCCEEECBB....BAAACB',
    '...BAAAAAAAAAAAB...BCCCBB',
    '...BAAAAAAAAAAAB...BCCCCB',
    '.BBAAAAAAAAAAAAAB..BAAAAB',
    '.BBAABBAAAAABAAAB..BCCCCB',
    '.BBAAAABAAABAAAABBBAACCCB',
    '.GGFAAABAAABAAAAGBBAABBCG',
    'BAABAAABAAABAAABABBCAAAB.',
    'BAAABBBBAAABBBBAABBCCBB..',
    'BCCAAAAAAAAAAAAACBBBB....',
    '.BBBBGGAAAAAGBBBB........',
    '.BBCCBBAAAAABCCCB........',
    '...BBBBBBBBBBBBB.........',
  ];
  var raccPal={A:'#7f8894',B:'#282c33',C:'#40454b',D:'#f0ecf0',E:'#545c65',F:'#a0abbd',G:'#050029',H:'#efa09f'};

  var ottMap=[
    '.....AAAAAAAA......',
    '..AAACCCCCCCCAAA...',
    '.ACCCCCCCCCCCCCCA..',
    '.ACACCCCCCCCCCACA..',
    '..ACCBACCCCBACCA...',
    '..ACCAACDDCAACCA...',
    'AAACBBBBAABBBBCAAA.',
    '..ABEBABAABABEBA...',

    '...AABBBBBBBBAA....',
    '...ACCCCCCCCCCA....',

    '..ACCABBBBBBACCA...',
    '..ACCCABBBBACCCA...',

    '.ACAAABBBBBBAAACAA.',
    '.ACCCCABBBBACCCCA..',
    '..ACCCAAAAAACCCA...',
    '...AAA......AAA....',
  ];
  var ottPal={A:'#402110',B:'#f2d79d',C:'#9f5332',D:'#ff6970',E:'#c47b4a'};

  var b=document.getElementById('beaver-sprite');
  if(b)b.innerHTML=spriteToSVG(beavMap,beavPal,px);
  var r=document.getElementById('raccoon-sprite');
  if(r)r.innerHTML=spriteToSVG(raccMap,raccPal,px);
  var o=document.getElementById('otter-sprite');
  if(o)o.innerHTML=spriteToSVG(ottMap,ottPal,px);
})();
</script>
</body>
</html>
