<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --amber:#C98B2A;--amber-light:#F2E4C0;
  --forest:#4A8838;--forest-light:#D6E8C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  max-width:780px;width:100%;padding:2rem 2.5rem;
  display:flex;flex-direction:column;align-items:center;
  gap:1.6rem;text-align:center;
  animation:fadeUp 0.7s ease both;
}

.title-row{
  display:flex;align-items:center;gap:14px;
  flex-wrap:wrap;justify-content:center;
}
h1{
  font-family:var(--font-display);font-size:46px;font-weight:300;
  color:var(--ink);letter-spacing:-0.01em;line-height:1;
}
.wip-tag{
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:4px 10px;border-radius:4px;
  color:var(--terra);background:var(--terra-light);
  border:1px dashed var(--terra);
}

.roadmap{
  width:100%;max-width:700px;
  display:grid;grid-template-columns:30px 1fr 32px 1fr;
  gap:12px 18px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:22px 26px;
}

.header-what, .header-why{
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--ink-3);text-align:left;
  padding-bottom:10px;border-bottom:1px solid var(--border);
}
.header-what{grid-column:2}
.header-why{grid-column:4}

.row-num{
  font-family:var(--font-mono);font-size:13px;font-weight:600;
  color:var(--terra);text-align:right;
}
.row-what{
  font-family:var(--font-display);font-size:20px;
  color:var(--ink);text-align:left;line-height:1.2;
}
.row-what .dams{font-family:var(--font-mono);font-size:13px;color:var(--ink-3);display:block;margin-top:2px;letter-spacing:0.1em}
.row-arrow{
  font-family:var(--font-mono);font-size:18px;
  color:var(--ink-3);text-align:center;line-height:1;
}
.row-why{
  font-size:14px;color:var(--ink-2);text-align:left;line-height:1.45;
}
.row-why b{color:var(--ink);font-weight:500}

.rmap-row{
  display:contents;
  opacity:0;animation:rowIn 0.5s ease forwards;
}
.rmap-row:nth-child(2){animation-delay:0.1s}
.rmap-row:nth-child(3){animation-delay:0.2s}
.rmap-row:nth-child(4){animation-delay:0.3s}
.rmap-row:nth-child(5){animation-delay:0.4s}

@keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}

@media(max-width:600px){
  body{overflow-y:auto}
  .slide{padding:1.5rem 1.2rem;gap:1.2rem}
  h1{font-size:32px}
  .roadmap{padding:16px 14px;grid-template-columns:22px 1fr 22px 1fr;gap:10px 10px}
  .header-what, .header-why{font-size:9px}
  .row-what{font-size:16px}
  .row-why{font-size:12px}
  .row-arrow{font-size:14px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>

<div class="slide">
  <div class="title-row">
    <h1>roadmap</h1>
    <span class="wip-tag">wip</span>
  </div>

  <div class="roadmap">
    <div class="header-what">what</div>
    <div class="header-why">why</div>

    <div class="rmap-row">
      <div class="row-num">1</div>
      <div class="row-what">local model</div>
      <div class="row-arrow">→</div>
      <div class="row-why"><b>no surveillance.</b> private to you.</div>
    </div>

    <div class="rmap-row">
      <div class="row-num">2</div>
      <div class="row-what">more harnesses</div>
      <div class="row-arrow">→</div>
      <div class="row-why"><b>cost efficiency.</b> no lock-in.</div>
    </div>

    <div class="rmap-row">
      <div class="row-num">3</div>
      <div class="row-what">local machine</div>
      <div class="row-arrow">→</div>
      <div class="row-why"><b>permissionless.</b> your hardware, your rules.</div>
    </div>

    <div class="rmap-row">
      <div class="row-num">4</div>
      <div class="row-what">marketplace<span class="dams">"dams"</span></div>
      <div class="row-arrow">→</div>
      <div class="row-why"><b>collective wisdom.</b> filters the best apps &amp; skills.</div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <a href="slide-06-roadmap-old.html">&larr; prev</a>
  <a href="slide-07-thanks.html">next &rarr;</a>
</nav>

</body>
</html>
