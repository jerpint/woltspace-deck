<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the lodge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --amber:#C98B2A;--amber-light:#F2E4C0;
  --forest:#4A8838;--forest-light:#D6E8C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  max-width:800px;padding:2rem 3rem;
  display:flex;flex-direction:column;align-items:center;
  gap:2rem;text-align:center;
  animation:fadeUp 0.7s ease both;
}

h1{font-family:var(--font-display);font-size:44px;font-weight:300;color:var(--ink);letter-spacing:-0.01em}

.subtitle{font-size:18px;color:var(--ink-2);font-weight:300;line-height:1.6;max-width:560px}
.subtitle strong{color:var(--terra);font-weight:500}

/* architecture diagram */
.arch{
  display:flex;flex-direction:column;align-items:center;
  gap:0;width:100%;max-width:640px;
  margin-top:0.5rem;
}

.lodge-box{
  width:100%;border:2px solid var(--border-2);border-radius:14px;
  background:var(--surface);padding:20px;
  position:relative;
}
.lodge-label{
  position:absolute;top:-11px;left:24px;
  background:var(--bg);padding:0 10px;
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-3);
}

.wolts-row{
  display:flex;gap:12px;justify-content:center;
  flex-wrap:wrap;
}
.wolt-card{
  flex:1;min-width:150px;max-width:190px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--surface-2);padding:14px 12px;
  text-align:left;
  transition:border-color 0.15s, transform 0.15s;
}
.wolt-card:hover{border-color:var(--border-2);transform:translateY(-2px)}
.wolt-card.raccoon{border-left:3px solid #7f8894}
.wolt-card.beaver{border-left:3px solid #af6127}
.wolt-card.otter{border-left:3px solid #9f5332}

.wolt-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wolt-emoji{font-size:20px}
.wolt-name{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink)}

.wolt-layers{
  display:flex;flex-direction:column;gap:4px;
}
.layer{
  font-family:var(--font-mono);font-size:10px;
  padding:4px 8px;border-radius:4px;
  color:var(--ink-2);letter-spacing:0.04em;
}
.layer.memory{background:var(--amber-light)}
.layer.site{background:var(--forest-light)}
.layer.sparks{background:var(--terra-light)}

/* shared infra row */
.infra{
  width:100%;display:flex;gap:8px;justify-content:center;
  margin-top:14px;padding-top:14px;
  border-top:1px dashed var(--border);
}
.infra-item{
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--ink-3);padding:6px 12px;
  border:1px solid var(--border);border-radius:6px;
  background:var(--bg);
}

/* connector arrow */
.connector{
  display:flex;flex-direction:column;align-items:center;
  color:var(--ink-3);font-size:11px;
  font-family:var(--font-mono);
  padding:4px 0;
}
.connector .arrow{font-size:16px;line-height:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}
</style>
</head>
<body>

<div class="slide">
  <h1>the lodge</h1>
  <div class="subtitle">
    One <strong>shared platform</strong>. Each wolt gets its own directory,
    memory, site, and identity &mdash; isolated but connected.
  </div>

  <div class="arch">
    <div class="lodge-box">
      <span class="lodge-label">woltspace lodge</span>
      <div class="wolts-row">
        <div class="wolt-card raccoon">
          <div class="wolt-header"><span class="wolt-emoji">🦝</span><span class="wolt-name">prwolt</span></div>
          <div class="wolt-layers">
            <div class="layer memory">memory/</div>
            <div class="layer site">site/</div>
            <div class="layer sparks">sparks/</div>
          </div>
        </div>
        <div class="wolt-card beaver">
          <div class="wolt-header"><span class="wolt-emoji">🦫</span><span class="wolt-name">beavwolt</span></div>
          <div class="wolt-layers">
            <div class="layer memory">memory/</div>
            <div class="layer site">site/</div>
            <div class="layer sparks">sparks/</div>
          </div>
        </div>
        <div class="wolt-card otter">
          <div class="wolt-header"><span class="wolt-emoji">🦦</span><span class="wolt-name">ottwolt</span></div>
          <div class="wolt-layers">
            <div class="layer memory">memory/</div>
            <div class="layer site">site/</div>
            <div class="layer sparks">sparks/</div>
          </div>
        </div>
      </div>
      <div class="infra">
        <span class="infra-item">tunnel</span>
        <span class="infra-item">viewport</span>
        <span class="infra-item">sessions</span>
        <span class="infra-item">telegram</span>
        <span class="infra-item">cron</span>
      </div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <a href="slide-02-what-is-a-wolt.html">&larr; prev</a>
  <a href="slide-04-memory.html">next &rarr;</a>
</nav>

</body>
</html>
