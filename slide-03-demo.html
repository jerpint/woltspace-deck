<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>let's build something</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --amber:#C98B2A;--amber-light:#F2E4C0;
  --forest:#4A8838;--forest-light:#D6E8C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  max-width:700px;width:100%;padding:2.5rem;
  display:flex;flex-direction:column;align-items:center;
  gap:2.2rem;text-align:center;
  animation:fadeUp 0.7s ease both;
}

h1{font-family:var(--font-display);font-size:48px;font-weight:300;color:var(--ink);letter-spacing:-0.01em;line-height:1.1}

.steps{
  display:flex;align-items:center;gap:16px;
  width:100%;max-width:600px;justify-content:center;
}
.step{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.step-num{
  font-family:var(--font-mono);font-size:32px;font-weight:600;
  color:var(--terra);line-height:1;
}
.step-text{
  font-size:14px;color:var(--ink-2);line-height:1.4;
}
.step-text strong{color:var(--ink);font-weight:600}
.step-arrow{
  font-size:22px;color:var(--ink-3);flex-shrink:0;
  margin-top:-16px;
}

.demo-prompt{
  font-family:var(--font-mono);font-size:14px;
  color:var(--ink-2);
  padding:14px 24px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  max-width:500px;
}
.demo-prompt .cursor{
  display:inline-block;width:2px;height:16px;
  background:var(--terra);vertical-align:text-bottom;
  animation:blink 1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}

@media(max-width:600px){
  body{overflow-y:auto}
  .slide{padding:1.5rem 1.2rem;gap:1.6rem}
  h1{font-size:36px}
  .steps{flex-direction:column;gap:12px}
  .step-arrow{transform:rotate(90deg);margin-top:0}
  .demo-prompt{font-size:12px;padding:10px 16px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>

<div class="slide">
  <h1>demo time.</h1>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text"><strong>spawn a wolt</strong></div>
    </div>
    <div class="step-arrow">&rarr;</div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>give it a task</strong></div>
    </div>
    <div class="step-arrow">&rarr;</div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text"><strong>it ships</strong></div>
    </div>
  </div>

  <div class="demo-prompt">
    &gt; build me a ___<span class="cursor"></span>
  </div>
</div>

<nav class="slide-nav">
  <a href="slide-02-pitch.html">&larr; prev</a>
  <a href="slide-04-why.html">next &rarr;</a>
</nav>

</body>
</html>
