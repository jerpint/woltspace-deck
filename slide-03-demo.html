<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>demo time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

.slide{
  max-width:640px;width:100%;padding:2.5rem;
  display:flex;flex-direction:column;align-items:center;
  gap:2.2rem;text-align:center;
  animation:fadeUp 0.7s ease both;
}

h1{font-family:var(--font-display);font-size:52px;font-weight:300;color:var(--ink);letter-spacing:-0.01em;line-height:1}

.terminal{
  width:100%;max-width:480px;
  border-radius:10px;overflow:hidden;
  box-shadow:0 4px 24px rgba(24,16,10,0.12);
}
.terminal-chrome{
  background:#2a1f14;padding:10px 14px;
  display:flex;align-items:center;gap:7px;
}
.dot{width:10px;height:10px;border-radius:50%}
.dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
.terminal-body{
  background:#1a130c;padding:18px 20px;
  font-family:var(--font-mono);font-size:13px;
  color:#d4c5a8;text-align:left;
  min-height:100px;
  display:flex;flex-direction:column;gap:6px;
}
.term-line{display:flex;align-items:center;gap:8px;opacity:0;animation:lineIn 0.4s ease forwards}
.term-line{animation-delay:0.3s}

.term-prompt{color:#5BC87A}
.term-dim{color:#6b5d4a}
.term-cursor{
  display:inline-block;width:7px;height:14px;
  background:#d4c5a8;vertical-align:text-bottom;
  animation:blink 1s step-end infinite;
}
.spinner{color:#5BC87A}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes lineIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}

@media(max-width:600px){
  body{overflow-y:auto}
  .slide{padding:1.5rem 1.2rem;gap:1.6rem}
  h1{font-size:40px}
  .terminal-body{font-size:12px;padding:14px 16px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>

<div class="slide">
  <h1>demo time.</h1>

  <div class="terminal">
    <div class="terminal-chrome">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    </div>
    <div class="terminal-body">
      <div class="term-line"><span class="term-prompt">~/woltspace $</span> <span class="term-cursor"></span></div>
    </div>
  </div>
</div>

<nav class="slide-nav">
  <a href="slide-02-pitch.html">&larr; prev</a>
  <a href="slide-04-why.html">next &rarr;</a>
</nav>

<script>
(function(){
  var spinner = document.querySelector('.spinner');
  if (!spinner) return;
  var frames = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
  var i = 0;
  setInterval(function(){ spinner.textContent = frames[i++ % frames.length]; }, 90);
})();
</script>
</body>
</html>
