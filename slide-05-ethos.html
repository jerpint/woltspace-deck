<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the ethos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Preahvihear&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDE8DE;--surface:#F5F1E8;--surface-2:#FAF7F0;
  --border:#D6CCBA;--border-2:#C4B89E;
  --ink:#18100A;--ink-2:#5C4D3C;--ink-3:#9A8878;
  --terra:#C4531E;--terra-light:#F0D5C8;
  --font-display:'Preahvihear',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

.slide{
  max-width:780px;width:100%;padding:1.2rem 2.5rem 0;
  display:flex;flex-direction:column;align-items:center;
  gap:1.4rem;text-align:center;
  animation:fadeUp 0.7s ease both;
}

.eyebrow{
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  color:var(--terra);letter-spacing:0.18em;text-transform:uppercase;
}

h1{
  font-family:var(--font-display);font-size:44px;font-weight:300;
  color:var(--ink);letter-spacing:-0.01em;line-height:1.1;
  max-width:640px;
}
h1 .accent{color:var(--terra)}
h1 .struck{
  position:relative;display:inline-block;color:var(--ink-3);
}
h1 .struck::after{
  content:'';position:absolute;left:-2%;right:-2%;top:52%;height:2px;
  background:var(--ink-3);transform:rotate(-3deg);
}

.manifesto{
  display:flex;flex-direction:column;gap:0;
  width:100%;max-width:620px;
}
.manifesto-line{
  display:flex;align-items:center;gap:24px;
  padding:10px 20px;
  border-bottom:1px solid var(--border);
}
.manifesto-line:first-child{border-top:1px solid var(--border)}
.manifesto-sprite{image-rendering:pixelated;display:flex;justify-content:center;align-items:center;flex-shrink:0;min-width:120px;min-height:80px}
.manifesto-sprite svg{display:block}
.manifesto-text{
  font-family:var(--font-display);font-size:40px;
  color:var(--ink);font-weight:300;text-align:left;line-height:1.2;
}
.manifesto-text .accent{color:var(--terra)}

.manifesto-sub{
  font-size:20px;color:var(--ink-2);line-height:1.6;font-weight:300;
  max-width:500px;text-align:center;
}

@keyframes waddle{0%,100%{transform:rotate(0deg) translateY(0)}25%{transform:rotate(-6deg) translateY(-2px)}75%{transform:rotate(6deg) translateY(-2px)}}
@keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pirouette{0%{transform:rotateY(0deg)}50%{transform:rotateY(180deg)}100%{transform:rotateY(360deg)}}
#beaver-sprite{animation:hop 1.2s ease-in-out infinite}
#raccoon-sprite{animation:waddle 0.7s ease-in-out infinite}
#otter-sprite{animation:pirouette 2.5s ease-in-out infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.slide-nav{
  position:fixed;bottom:1.5rem;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 2rem;pointer-events:none;z-index:20;
}
.slide-nav a{
  pointer-events:auto;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--ink-3);text-decoration:none;
  padding:8px 16px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  transition:all 0.15s;
}
.slide-nav a:hover{border-color:var(--border-2);color:var(--ink);background:var(--surface-2)}

@media(max-width:700px){
  body{overflow-y:auto}
  .slide{padding:1.2rem 1rem;gap:1rem}
  h1{font-size:30px}
  .manifesto-line{padding:10px 14px;gap:10px}
  .manifesto-text{font-size:22px}
  .manifesto-sprite{min-width:70px}
  .manifesto-sub{font-size:16px}
  .slide-nav{padding:0 1rem;bottom:1rem}
  .slide-nav a{font-size:11px;padding:6px 12px}
}
</style>
</head>
<body>

<div class="slide">
  <div class="eyebrow">the ethos</div>
  <h1>
    your <span class="accent">hardware</span>.<br>
    your <span class="accent">creatures</span>.<br>
    <span class="struck">someone else's cloud</span>.
  </h1>

  <div class="manifesto">
    <div class="manifesto-line">
      <div class="manifesto-sprite" id="beaver-sprite"></div>
      <div class="manifesto-text">Bring the home server <span class="accent">back</span>.</div>
    </div>
    <div class="manifesto-line">
      <div class="manifesto-sprite" id="raccoon-sprite"></div>
      <div class="manifesto-text">Bring the weird web <span class="accent">back</span>.</div>
    </div>
    <div class="manifesto-line">
      <div class="manifesto-sprite" id="otter-sprite"></div>
      <div class="manifesto-text">Bring decentralization <span class="accent">back</span>.</div>
    </div>
  </div>

  <div class="manifesto-sub">Open source, so you can hack it. Runs on your machine — laptop, home server. No cloud bills. No permissions needed.</div>
</div>

<nav class="slide-nav">
  <a href="slide-06-roadmap-merged.html">&larr; prev</a>
  <a href="slide-07-thanks.html">next &rarr;</a>
</nav>

<script>
(function(){
  var px=2;
  function spriteToSVG(map,palette,px){
    var rows=map.length,cols=Math.max.apply(null,map.map(function(r){return r.length}));
    var rects=[];
    for(var r=0;r<rows;r++)for(var c=0;c<map[r].length;c++){
      var ch=map[r][c];if(ch===' '||ch==='.')continue;
      var fill=palette[ch];if(!fill)continue;
      rects.push('<rect x="'+(c*px)+'" y="'+(r*px)+'" width="'+px+'" height="'+px+'" fill="'+fill+'"/>');
    }
    return '<svg width="'+(cols*px)+'" height="'+(rows*px)+'" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block" shape-rendering="crispEdges">'+rects.join('')+'</svg>';
  }

  var beavMap=[
    '..AAA........AAA.....',
    '.ABBBA......ABBBA....',
    '.ABAAAAAAAAAAAABA....',
    '.ABABBBBBBBBBAABA....',
    '..ABBBBBBBBBBBAA.....',
    '..ABABBBBAEBBBAA.....',
    '..ABABBBBAEBBBAA.....',
    '.ABBAAAABAEBBBBA.....',
    '.ABACAACCCFABBBA.....',
    '.ABACCACCCFABBBA.AAA.',
    '.ABBAAAAAAEBBBAAADDDA',
    '..ABBCAFABBBBAA.AADDA',
    '...ABAAAABBBBBBAADADA',
    '..ABBBBBBBBBBBBAADDAA',
    '.ABBABCCCAEBBBBBAADDA',
    '.ABBACCCABBBBABBADADA',
    '.AGGACCCAGGGGABBADADA',
    '..AAACCCAAAAABBBADDA.',
    '..ABCCCCCCFABBBBAAAA.',
    '.AAABCCCCAAAABBBAA...',
    'ABBBACCCABBBBBBAA....',
    'AAAAAAAAAAAAAAAA.....',
  ];
  var beavPal={A:'#3f190e',B:'#af6127',C:'#fce6b0',D:'#773c1f',E:'#050003',F:'#fffee7',G:'#dd7a2d'};

  var raccMap=[
    '...BB........BBB.........',
    '...BFGG.....GFFB.........',
    '...BABB.....BAAB.........',
    '...BCAABBBBBACCB.........',
    '...BAAAAAAAAAAAB.........',
    '...BCCCCAAACCCCB.........',
    '...BCBCCAAACCCCB.........',
    '.BBCCBBCBCCCBCBCB........',
    '.BBACBBCAAACBCCAB........',
    '.BBCAAADHHHDAAACB...BBB..',
    '.BBCAAADHHHDAAACB...BBB..',
    '...BCAADDDDDAEEB...BCCCB.',
    '....BCCCCEEECBB....BAAACB',
    '...BAAAAAAAAAAAB...BCCCBB',
    '...BAAAAAAAAAAAB...BCCCCB',
    '.BBAAAAAAAAAAAAAB..BAAAAB',
    '.BBAABBAAAAABAAAB..BCCCCB',
    '.BBAAAABAAABAAAABBBAACCCB',
    '.GGFAAABAAABAAAAGBBAABBCG',
    'BAABAAABAAABAAABABBCAAAB.',
    'BAAABBBBAAABBBBAABBCCBB..',
    'BCCAAAAAAAAAAAAACBBBB....',
    '.BBBBGGAAAAAGBBBB........',
    '.BBCCBBAAAAABCCCB........',
    '...BBBBBBBBBBBBB.........',
  ];
  var raccPal={A:'#7f8894',B:'#282c33',C:'#40454b',D:'#f0ecf0',E:'#545c65',F:'#a0abbd',G:'#050029',H:'#efa09f'};

  var ottMap=[
    '.....AAAAAAAA......',
    '..AAACCCCCCCCAAA...',
    '.ACCCCCCCCCCCCCCA..',
    '.ACACCCCCCCCCCACA..',
    '..ACCBACCCCBACCA...',
    '..ACCAACDDCAACCA...',
    'AAACBBBBAABBBBCAAA.',
    '..ABEBABAABABEBA...',
    '.AAABBBABBABBBAAA..',
    '...AABBBBBBBBAA....',
    '...ACCCCCCCCCCA....',
    '..ACCCCBBBBCCCCA...',
    '..ACCABBBBBBACCA...',
    '..ACCCABBBBACCCA...',
    '..AACCABBBBACCAA.AA',
    '..ACAABBBBBBAACAACA',
    '.ACCCBBBBBBBBCCCACA',
    '.ACAAABBBBBBAAACAA.',
    '.ACCCCABBBBACCCCA..',
    '..ACCCAAAAAACCCA...',
    '...AAA......AAA....',
  ];
  var ottPal={A:'#402110',B:'#f2d79d',C:'#9f5332',D:'#ff6970',E:'#c47b4a'};

  var svg_b = spriteToSVG(beavMap,beavPal,px);
  var svg_r = spriteToSVG(raccMap,raccPal,px);
  var svg_o = spriteToSVG(ottMap,ottPal,px);

  // Static sprites next to manifesto lines
  var bs=document.getElementById('beaver-sprite'); if(bs) bs.innerHTML=svg_b;
  var rs=document.getElementById('raccoon-sprite'); if(rs) rs.innerHTML=svg_r;
  var os=document.getElementById('otter-sprite'); if(os) os.innerHTML=svg_o;

})();
</script>
</body>
</html>
